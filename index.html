<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/favicon.png">
</head>
<body>

    <header>
        <div class="header-container">
            <img src="assets/logo.png" alt="">
            <h1> Tic Tac Toe </h1>
        </div>
    </header>

    <main>
        <div class="homeScreen">
            <div class="card-container">

                <div class="card" data-card="1">

                    <div class="top">
                        <span>X</span>
                    </div>
                    <div class="avatar">
                        <img src="assets/human.gif" alt="Avatar">
                    </div>
                    <div class="bottom">
                        <span class="choose player" id="player1">Player</span>
                        <span class="choose bot" id="bot1">Bot</span>
                    </div>

                </div>

                <div class="start-container">
                    <span class="vs">VS</span>
                    <input type="button" class="startGame" value="Start Game">
                </div>

                <div class="card" data-card="2">                    

                    <div class="top">
                        <span>0</span>
                    </div>
                    <div class="avatar">
                        <img src="assets/bot.gif" alt="Avatar">
                    </div>
                    <div class="bottom">
                        <span class="choose player" id="player2">Player</span>
                        <span class="choose bot" id="bot2">Bot</span>
                    </div>

                </div>
                
            </div>
        </div>
    </main>

    <footer>
        <span> Developed by </span>
        | <a href="" target="_blank">Ro Han</a> |
    </footer>

    <script src="script.js"></script>
</body>
</html>
